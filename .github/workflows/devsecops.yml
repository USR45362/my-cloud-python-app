name: GHAS-DevSecOps-Pipeline

on: [push]

jobs:
  security_scans:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. GHAS Native Code Scanning (CodeQL)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'
          # This tells CodeQL to use its standard security queries
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

      # 2. Container Configuration Scan (Trivy remains for Docker layers)
      - name: Run Trivy (Dockerfile Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          format: 'sarif'
          output: 'trivy.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-config