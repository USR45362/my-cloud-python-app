name: GHAS-DevSecOps-Pipeline

on: [push]

jobs:
  security_scans:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      issues: write  # Required so OWASP ZAP can automatically log found alerts

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # =======================================================
      # PHASE 1: SAST (GitHub Advanced Security - CodeQL)
      # =======================================================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

      # =======================================================
      # PHASE 2: Infrastructure-as-Code Scan (Trivy Config)
      # =======================================================
      - name: Run Trivy (Dockerfile Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          format: 'sarif'
          output: 'trivy.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-config

      # =======================================================
      # PHASE 3: DAST (Dynamic Testing via OWASP ZAP)
      # =======================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          pip install -r requirements.txt

      - name: Start FastAPI Application Backgrounded
        run: |
          # Boots up server in the background and waits 5 seconds to initialize
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:8000/'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false