name: GHAS-DevSecOps-Pipeline

on: [push]

jobs:
  security_scans:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- PHASE 1: SAST (CodeQL) ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

      # --- PHASE 2: IaC Scan (Trivy) ---
      - name: Run Trivy (Dockerfile Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          format: 'sarif'
          output: 'trivy.sarif'

       Tarifa-upload:
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-config

      # --- PHASE 3: DAST (OWASP ZAP) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          pip install -r requirements.txt

      - name: Start FastAPI Application Backgrounded
        run: |
          # Run uvicorn in the background and wait a few seconds for it to boot
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://127.0.0.1:8000/'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false # Keeps the pipeline green while alerting us to findings